<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spălătorie Cămin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f0f0f;
            color: #e8e8e8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .icon { font-size: 3rem; margin-bottom: 24px; opacity: 0.4; }
        h1 {
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }
        p {
            font-size: 1rem;
            color: #888;
            font-weight: 300;
            max-width: 320px;
            line-height: 1.6;
        }
        footer {
            position: fixed;
            bottom: 32px;
            font-size: 0.8rem;
            color: #444;
            font-weight: 300;
            letter-spacing: 0.3px;
        }
        footer span {
            color: #666;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="icon">🧺</div>
    <h1>Serviciu Nefuncțional</h1>
    <p>Acest serviciu de rezervări nu mai este disponibil.</p>

    <footer>Noi am încercat. <span>Vă mulțumim.</span></footer>
</body>
</html>
